<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="TASK2.CSS">
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">

        <button>Clr</button>
        <button>Del</button>
        <button class="operators">%</button>
        <button class="operators">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operators">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operators">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operators">+</button>

        <button>.</button>
        <button>0</button>
        <button class="calculate">=</button>
   
        </div>

    </div>
    <script src="TASK2.JS"></script>
</body>
</html>
